<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/at04.css">
    <title>Semana de Tecnologia IFAL - Inscrição</title>
</head>
<body>

    <header>
        <h1>Inscrição: Semana de Tecnologia IFAL</h1>
    </header>

    <main>

        <section>
            <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">
                
                <input type="hidden" name="edicao" value="2026">

                <fieldset>
                    <legend>Identificação do Participante</legend>

                    <div>
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div>
                        <label for="email">E-mail Institucional</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div>
                        <label for="cidade">Cidade de Origem</label>
                        <input type="text" id="cidade" name="cidade" list="cidades-al">
                        <datalist id="cidades-al">
                            <option value="Flexeiras">
                            <option value="Maceió">
                            <option value="Rio Largo">
                            <option value="Arapiraca">
                            <option value="Palmeira dos Índios">
                            <option value="Penedo">
                            <option value="União dos Palmares">
                            <option value="Santana do Ipanema">
                            <option value="Delmiro Gouveia">
                        </datalist>
                    </div>

                    <div>
                        <label for="foto">Foto para crachá</label>
                        <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="instrucao-foto">
                        <small id="instrucao-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Preferências para o Evento</legend>

                    <div>
                        <label for="chegada">Data e hora preferida para chegada</label>
                        <input type="datetime-local" id="chegada" name="chegada">
                    </div>
                    <div>
                        <label for="experiencia">
                            Nível de experiência em programação: <span id="valor-experiencia">5</span>/10
                        </label>
                        <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5" 
                               oninput="document.getElementById('valor-experiencia').textContent = this.value">
                    </div>
                    <div>
                        <label for="cor_camiseta">Cor de preferência para a camiseta</label>
                        <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8">
                    </div>

                    <div>
                        <label for="oficinas">Oficinas de interesse (Multiseleção)</label>
                        <select name="oficinas[]" id="oficinas" multiple size="4" aria-describedby="instrucao-oficinas">
                            <option value="python">Python para Dados</option>
                            <option value="ux">Design UX/UI</option>
                            <option value="iot">Internet das Coisas</option>
                            <option value="cyber">Cibersegurança</option>
                            <option value="agile">Metodologias Ágeis</option>
                        </select>
                        <br>
                        <small id="instrucao-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
                    </div>
                </fieldset>

                <div>
                    <button type="submit">Confirmar inscrição</button>
                </div>

            </form>
        </section>

        <section style="margin-top: 20px;">
            <a href="../index.html">← Voltar à página principal</a>
        </section>
    </main>

</body>
</html>
