<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/at02.css">
    <title>Cadastro de Usuário</title>
</head>
<body>

    <header>
        <h1>Cadastro de Usuário</h1>
    </header>

    <main>

        <section>
            <form action="https://httpbin.org/get" method="GET">

                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required minlength="3">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required minlength="8">

                <fieldset>
                    <legend>Gênero</legend>

                    <div>
                        <input type="radio" id="masc" name="genero" value="masculino">
                        <label for="masc">Masculino</label>
                    </div>

                    <div>
                        <input type="radio" id="fem" name="genero" value="feminino">
                        <label for="fem">Feminino</label>
                    </div>

                    <div>
                        <input type="radio" id="outro" name="genero" value="outro">
                        <label for="outro">Outro</label>
                    </div>

                    <div>
                        <input type="radio" id="pni" name="genero" value="prefiro_nao_informar">
                        <label for="pni">Prefiro não informar</label>
                    </div>
                </fieldset>

                <div>
                    <input type="checkbox" id="aceite" name="aceite" value="sim" required>
                    <label for="aceite">Aceito os termos de uso</label>
                </div>

                <div>
                    <button type="reset">Limpar campos</button>
                    <button type="submit">Criar conta</button>
                </div>

            </form>
        </section>

        <section>
            <a href="../index.html">← Voltar à página principal</a>
        </section>

    </main>

    <footer>
        <p>© 2026 - Desenvolvido por Givanildo</p>
    </footer>
    
</body>
</html>
