<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWEB1 — Cap. 07 — AT01 — Cartão de Apresentação</title>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Inter', sans-serif;
                background: #f1f5f9;
                color: #1e293b;
            }

            header {
                text-align: center;
                padding: 40px 20px;
                background: #0f172a;
                color: white;
            }

            section {
                max-width: 900px;
                margin: 20px auto;
                padding: 25px;
                background: white;
                border-radius: 12px;
            }

            a {
                text-decoration: none;
                color: #0f172a;
                font-weight: 600;
                display: inline-block;
                margin-top: 10px;
                transition: 0.3s;
            }

            a:hover {
                color: #2563eb;
            }

            footer {
                text-align: center;
                padding: 20px;
                background: #0f172a;
                color: white;
                margin-top: 20px;
            }

            .cartao {
                width: 40rem;
                padding: 2rem;
                border-radius: 8px;
                background: white;
                margin: 2rem auto;
            }

            .cartao-nome {
                font-size: 2rem;
                color: #598fcd;
                margin-bottom: 10px;
                text-align: center;
            }

            .cartao-divisor {
                border: 3px dashed #1f3c88;
            }

            .cartao-cargo {
                font-style: italic;
                color: #333;
                margin: 1rem 0 1rem ;
                text-align: center;
            }

            .cartao-email {
                font-size: 1rem;
                color: #007bff;
                text-align: center;
            }
        </style>
</head>



<body>

    <header>
        <h1>Cartão de Apresentação</h1>
    </header>

    <main>

        <article class="cartao">
            <h1 class="cartao-nome">
                Givanildo Lourenço de Farias
            </h1>

            <hr class="cartao-divisor" />

            <p class="cartao-cargo">
                Estudante de Sistemas de Informação — IFAL
            </p>

            <p class="cartao-email">
                glf2@aluno.ifal.edu.br
            </p>
        </article>

        <section>
            <a href="../index.html">← Voltar à página principal</a>
        </section>

    </main>
    
    <footer>
        <p>© 2026 - Desenvolvido por Givanildo</p>
    </footer>
    
</body>
</html>
